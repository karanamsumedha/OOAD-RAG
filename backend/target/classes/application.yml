server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/rag_platform
    username: rag_user
    password: rag_pass
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  sql:
    init:
      mode: never

app:
  security:
    jwt:
      # IMPORTANT: for demo only. For production, set via environment variable and rotate.
      secret: "change-me-to-a-long-random-secret-change-me-to-a-long-random-secret"
      issuer: "rag-platform"
      accessTokenMinutes: 60

logging:
  level:
    org.springframework.security: INFO

